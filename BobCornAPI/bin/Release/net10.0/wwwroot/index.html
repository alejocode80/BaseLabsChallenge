<!DOCTYPE html>
<html>
<body>
    <h1>Bob's Corn</h1>
    <label for="apiKey">API Key:</label>
    <input type="text" id="apiKey" placeholder="Enter your API key" style="margin-bottom: 10px;" />
    <button onclick="login()" style="font-size: 20px;color: navy; cursor: pointer;border-width: medium;">Login</button>
    <br><br>
    <button onclick="buyCorn()" style="font-size: 20px;color: navy; cursor: pointer;border-width: medium;">Buy Corn</button>
    <p id="response"></p>
    <div style="margin-top: 20px;">
        <p><strong>Purchased Amount:</strong> <span id="purchasedAmount">0</span></p>
        <p><strong>Shipped Amount:</strong> <span id="shippedAmount">0</span></p>
    </div>
    <table border="1" style="margin-top: 20px;">
        <thead>
            <tr>
                <th>Client ID</th>
                <th>Order Number</th>
                <th>Amount</th>
                <th>Timestamp</th>
                <th>Status</th>
                <th>Shipped At</th>
            </tr>
        </thead>
        <tbody id="ordersTable">
        </tbody>
    </table>
    <button onclick="fetchData()" style="font-size: 16px; color: navy; cursor: pointer; border-width: medium; margin-top: 10px;">Refresh Table</button>

    <script>
        async function login() {
            try {
                const apiKey = document.getElementById('apiKey').value;
                if (!apiKey) {
                    document.getElementById('response').innerText = 'Please enter an API key.';
                    return;
                }

                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ secret: apiKey })
                });

                if (res.ok) {
                    document.getElementById('response').innerText = 'Login successful!';
                    // Refresh orders table on successful login
                    setTimeout(fetchData, 500);
                } else {
                    document.getElementById('response').innerText = 'Login failed: Invalid API key.';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('response').innerText = `Error: ${error.message}`;
            }
        }

        async function buyCorn() {
            try {
                const apiKey = document.getElementById('apiKey').value;
                if (!apiKey) {
                    document.getElementById('response').innerText = 'Please enter an API key.';
                    return;
                }

                const order = {
                    clientId: await getClientIp(),
                    amount: 1
                };

                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': document.getElementById('apiKey').value
                    },
                    body: JSON.stringify(order)
                });
                
                if (res.status === 429) {
                    document.getElementById('response').innerText = 'The purchase of corn is limited to one per minute.';
                    return;
                }
                
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                
                console.log('Order placed successfully:', order);
                document.getElementById('response').innerText = 'Order placed successfully!';
                
                // Refresh the orders table
                setTimeout(fetchData, 500);
            } catch (error) {
                console.error('Error placing order:', error);
                document.getElementById('response').innerText = `Error: ${error.message}`;
            }
        }
        
        async function getClientIp() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                // Fallback to localhost if IP fetch fails
                return 'localhost';
            }
        }

        async function fetchData() {
            try {
                const clientId = await getClientIp();
                const res = await fetch(`/api/orders/summary?clientId=${encodeURIComponent(clientId)}`, {
                    headers: {
                        'X-API-Key': document.getElementById('apiKey').value
                    }
                });
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                const data = await res.json();
                console.log('API Response:', data);
                
                // Display amounts
                document.getElementById('purchasedAmount').textContent = data.purchasedAmount || 0;
                document.getElementById('shippedAmount').textContent = data.shippedAmount || 0;
                
                // Populate table
                const tableBody = document.getElementById('ordersTable');
                tableBody.innerHTML = '';
                if (data.orders && Array.isArray(data.orders) && data.orders.length > 0) {
                    data.orders.forEach(order => {
                        const row = tableBody.insertRow();
                        row.insertCell(0).textContent = order.clientId;
                        row.insertCell(1).textContent = order.orderNum;
                        row.insertCell(2).textContent = order.amount;
                        row.insertCell(3).textContent = new Date(order.timeStamp).toLocaleString();
                        row.insertCell(4).textContent = order.status;
                        row.insertCell(5).textContent = order.shippedAt ? new Date(order.shippedAt).toLocaleString() : '';
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No orders found</td></tr>';
                }
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('response').innerText = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
